<!-- 
  ADD-IN RICHIESTE RV - TASKPANE COMPONENT
  Version: 1.2.0-Cascading
  Date: 2026-07-13
  Changes: Integrato doppio fetch parallelo (Clienti + Fornitori/Tipologie). 
           Rimossi campi UI ridondanti. Gestione filtro bidirezionale Fornitore/Tipologia.
  Next Step: Gestione campi opzionali/obbligatori condizionali.
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Richiesta RV - Data Entry</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; padding: 16px; font-size: 13px; color: #333; }
  h2 { font-size: 15px; margin-bottom: 4px; color: #0078d4; }
  #modeLabel, #userLabel { color: #666; margin-bottom: 8px; font-size: 11px; }
  #userLabel { font-weight: bold; color: #107c41; margin-bottom: 16px; }
  label { display: block; margin-top: 12px; font-weight: 600; }
  input, select, button { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 2px; }
  input[readonly] { background-color: #f3f3f3; color: #666; cursor: not-allowed; }
  button { margin-top: 20px; background: #0078d4; color: white; border: none; cursor: pointer; padding: 8px; font-weight: bold; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  
  .search-container { position: relative; }
  .suggestions-list { 
    position: absolute; top: 100%; left: 0; right: 0; 
    background: white; border: 1px solid #ccc; border-top: none; 
    max-height: 200px; overflow-y: auto; z-index: 1000; display: none; 
    margin: 0; padding: 0; list-style: none;
  }
  .suggestions-list li { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
  .suggestions-list li:hover { background: #f3f3f3; }
  
  #log { margin-top: 16px; padding: 8px; background: #f3f3f3; font-size: 11px; white-space: pre-wrap; min-height: 60px; border: 1px dashed #ccc; }
</style>
</head>
<body>
  <h2>Inserimento Richiesta RV</h2>
  <div id="modeLabel">Modalità: caricamento...</div>
  <div id="userLabel">Utente: verifica in corso...</div>

  <!-- SEZIONE RICERCA CLIENTE -->
  <label for="searchCliente">Cerca Cliente (Codice o Ragione Sociale)</label>
  <div class="search-container">
    <input type="text" id="searchCliente" placeholder="Caricamento database..." autocomplete="off" disabled>
    <ul id="suggestions" class="suggestions-list"></ul>
  </div>

  <!-- CAMPI ANAGRAFICA ESSENZIALI (READ-ONLY) -->
  <label for="codPdV">Cod PdV</label>
  <input type="text" id="codPdV" readonly>

  <label for="ragioneSociale">Ragione Sociale</label>
  <input type="text" id="ragioneSociale" readonly>

  <label for="codBU">Cod BU</label>
  <input type="text" id="codBU" readonly>

  <label for="emailRSM">Email RSM (Destinatario CC)</label>
  <input type="text" id="emailRSM" readonly>

  <!-- NUOVA SEZIONE: FORNITORE E TIPOLOGIA INTERVENTO -->
  <label for="selectFornitore">Fornitore</label>
  <select id="selectFornitore" disabled>
    <option value="">-- Seleziona o cerca per tipologia sotto --</option>
  </select>

  <label for="inputTipologia">Tipologia Intervento (Cerca linea/prodotto)</label>
  <input type="text" id="inputTipologia" list="listaTipologie" placeholder="Seleziona prima il fornitore o digita qui..." disabled>
  <datalist id="listaTipologie"></datalist>

  <!-- CAMPO GRUPPO -->
  <label for="gruppoCliente">Gruppo?</label>
  <select id="gruppoCliente" disabled>
    <option value="No">No</option>
    <option value="Sì">Sì</option>
  </select>

  <button id="submitBtn" disabled>Genera Richiesta RV</button>

  <div id="log">Log eventi...</div>

  <script>
    // ----------------------------------------------------------------
    // VERSIONAMENTO E CONFIGURAZIONI DI TEST
    // ----------------------------------------------------------------
    const APP_VERSION = "v1.2.0-Cascading";
    const MASTER_USERS = ["g.angelici@partesa.it"];

    let fullDatabase = [];      
    let filteredDatabase = [];  
    let fornitoreTipologiaDb = [];
    let selectedCustomer = null;

    function log(msg) {
      const el = document.getElementById("log");
      el.textContent += "\n" + msg;
      el.scrollTop = el.scrollHeight;
    }

    Office.onReady(async (info) => {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode") || "general";
      
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.textContent = mode === "attach" ? "Allega e Invia Richiesta RV" : "Apri e Invia Richiesta RV";
      document.getElementById("modeLabel").textContent = "Versione: " + APP_VERSION + " | Modalità: " + mode + " | Host: " + info.host;

      // 1. IDENTIFICAZIONE UTENTE
      let userEmail = "";
      if (Office.context.mailbox && Office.context.mailbox.userProfile) {
        userEmail = Office.context.mailbox.userProfile.emailAddress.toLowerCase().trim();
      } else {
        userEmail = "giuseppe.angelici@partesa.it"; 
      }
      document.getElementById("userLabel").textContent = "Utente: " + userEmail;

      // 2. FETCH PARALLELO DEI DUE FILE JSON DA GITHUB
      const urlClienti = "https://giuseppeangelici-coder.github.io/outlook-addin-test/QryCustomerMaster.json";
      const urlFornitori = "https://giuseppeangelici-coder.github.io/outlook-addin-test/FornitoriTipologie.json";
      
      log("Avvio scaricamento database...");
      
      try {
        const [resClienti, resFornitori] = await Promise.all([
          fetch(urlClienti),
          fetch(urlFornitori)
        ]);

        if (!resClienti.ok) throw new Error("Errore database clienti: " + resClienti.status);
        if (!resFornitori.ok) throw new Error("Errore database fornitori: " + resFornitori.status);

        fullDatabase = await resClienti.json();
        fornitoreTipologiaDb = await resFornitori.json();

        log("Database clienti caricato (" + fullDatabase.length + " record).");
        log("Database fornitori caricato (" + fornitoreTipologiaDb.length + " record).");
        
        applyRowLevelSecurity(userEmail);
        popolaFornitoriUnivoci();

      } catch (err) {
        log("ERRORE CARICAMENTO: " + err.message);
      }

      // 3. ROW-LEVEL SECURITY (RLS)
      function applyRowLevelSecurity(email) {
        const isMaster = MASTER_USERS.map(e => e.toLowerCase()).includes(email);
        if (isMaster) {
          filteredDatabase = fullDatabase;
          log("Profilo: MASTER DETECTED. Visibilità completa.");
        } else if (fullDatabase.some(c => (c.emailResponsabileVendite || c.EmailResponsabileVendite || "").toLowerCase() === email)) {
          filteredDatabase = fullDatabase.filter(c => (c.emailResponsabileVendite || c.EmailResponsabileVendite || "").toLowerCase() === email);
          log("Profilo: RV DETECTED. Record: " + filteredDatabase.length);
        } else if (fullDatabase.some(c => (c.emailResponsabileCommerciale || c.EmailResponsabileCommerciale || "").toLowerCase() === email)) {
          filteredDatabase = fullDatabase.filter(c => (c.emailResponsabileCommerciale || c.EmailResponsabileCommerciale || "").toLowerCase() === email);
          log("Profilo: RSM DETECTED. Record: " + filteredDatabase.length);
        } else {
          filteredDatabase = fullDatabase; 
          log("Email non in anagrafica. Modalità provvisoria di test attiva.");
        }

        if (filteredDatabase.length > 0) {
          document.getElementById("searchCliente").disabled = false;
          document.getElementById("searchCliente").placeholder = "Cerca per Codice o Nome...";
        }
      }

      // 4. POPOLAMENTO INIZIALE DEI FORNITORI (UNIVOCI)
      function popolaFornitoriUnivoci() {
        const selectFornitore = document.getElementById("selectFornitore");
        const fornitoriVisti = new Set();

        fornitoreTipologiaDb.forEach(item => {
          const cod = item.CodiceFornitore;
          const ragSoc = item.RagioneSocialeFornitore;
          if (cod && !fornitoriVisti.has(cod)) {
            fornitoriVisti.add(cod);
            const opt = document.createElement("option");
            opt.value = cod;
            opt.textContent = ragSoc;
            selectFornitore.appendChild(opt);
          }
        });
      }

      // 5. GESTIONE DEI FILTRI INCROCIATI (CASCADING BIDIREZIONALE CORRETTO)
      const selectFornitore = document.getElementById("selectFornitore");
      const inputTipologia = document.getElementById("inputTipologia");
      const listaTipologie = document.getElementById("listaTipologie");

      // Verso A: Cambia il fornitore -> Filtra l'elenco tipologie disponibili
      selectFornitore.addEventListener("change", () => {
        const codFornitoreSelezionato = selectFornitore.value;
        inputTipologia.value = ""; // Reset tipologia precedente
        aggiornaDatalistTipologie(codFornitoreSelezionato);
      });

      // Verso B: L'utente scrive o seleziona una tipologia -> Allinea il fornitore
      inputTipologia.addEventListener("input", () => {
        const valoreDigitato = inputTipologia.value.trim().toLowerCase();
        
        // Cerca una corrispondenza esatta (case-insensitive) nel database delle tipologie
        const match = fornitoreTipologiaDb.find(item => 
          (item.TipologiaIntervento || "").trim().toLowerCase() === valoreDigitato
        );
        
        if (match) {
          // Normalizza i codici per il confronto per evitare mancate corrispondenze di stringa/numero
          const targetCodice = String(match.CodiceFornitore).trim();
          
          // Forza la selezione del fornitore corrispondente nella select
          selectFornitore.value = targetCodice;
          
          // Rigenera la lista filtrata per quel fornitore senza svuotare il testo appena inserito
          aggiornaDatalistTipologie(targetCodice);
          log("Fornitore allineato automaticamente a: " + match.RagioneSocialeFornitore);
        }
      });

      function aggiornaDatalistTipologie(codFornitore = "") {
        listaTipologie.innerHTML = "";
        
        const tipologieFiltrate = fornitoreTipologiaDb.filter(item => {
          return codFornitore === "" || String(item.CodiceFornitore).trim() === String(codFornitore).trim();
        });

        tipologieFiltrate.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item.TipologiaIntervento; 
          listaTipologie.appendChild(opt);
        });
      }

      // Al caricamento iniziale prepariamo la lista completa di tutte le tipologie
      aggiornaDatalistTipologie();

      // 6. AUTOCOMPLETE CLIENTE (Invariato)
      const searchInput = document.getElementById("searchCliente");
      const suggestionsList = document.getElementById("suggestions");

      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase().trim();
        suggestionsList.innerHTML = "";
        suggestionsList.style.display = "none";
        if (query.length < 2) return;

        const filtered = filteredDatabase.filter(c => {
          const chiave = c.searchKey || c.SearchKey || "";
          return chiave.toLowerCase().includes(query);
        }).slice(0, 10);

        if (filtered.length > 0) {
          suggestionsList.style.display = "block";
          filtered.forEach(c => {
            const li = document.createElement("li");
            li.textContent = c.searchKey || c.SearchKey || "";
            li.addEventListener("click", () => selectCustomer(c));
            suggestionsList.appendChild(li);
          });
        }
      });

      document.addEventListener("click", (e) => {
        if (e.target !== searchInput) suggestionsList.style.display = "none";
      });

      // 7. SELEZIONE CLIENTE -> SBLOCCO COMPLETO DEI CAMPI
      function selectCustomer(customer) {
        selectedCustomer = customer;
        searchInput.value = customer.searchKey || customer.SearchKey || "";
        suggestionsList.innerHTML = "";
        suggestionsList.style.display = "none";

        document.getElementById("codPdV").value = customer.codPdV || customer.CodPdV || "";
        document.getElementById("ragioneSociale").value = customer.ragioneSociale || customer.RagioneSociale || "";
        document.getElementById("codBU").value = customer.codBU || customer.CodBU || "";
        document.getElementById("emailRSM").value = customer.emailResponsabileCommerciale || customer.EmailResponsabileCommerciale || "";

        // RIMOSSO BLOCCO: Garantiamo che selectFornitore diventi reattivo ed editabile
        selectFornitore.disabled = false;
        inputTipologia.disabled = false;
        document.getElementById("gruppoCliente").disabled = false;
        submitBtn.disabled = false;

        log("Cliente Selezionato: " + (customer.codPdV || customer.CodPdV));
      }

      // 8. GENERAZIONE EMAIL HTML
      submitBtn.addEventListener("click", () => {
        if (!selectedCustomer) return;

        const cPdv = selectedCustomer.codPdV || selectedCustomer.CodPdV || "";
        const cRag = selectedCustomer.ragioneSociale || selectedCustomer.RagioneSociale || "";
        const cBu = selectedCustomer.codBU || selectedCustomer.CodBU || "";
        const cVen = selectedCustomer.venditore || selectedCustomer.Venditore || "N/D";
        const cEmailRsm = selectedCustomer.emailResponsabileCommerciale || selectedCustomer.EmailResponsabileCommerciale || "";
        
        const gruppoScelto = document.getElementById("gruppoCliente").value;
        const tipologiaScelta = inputTipologia.value.trim() || "Non specificata";
        
        // Recupero il nome testuale del fornitore selezionato
        const fornitoreOpt = selectFornitore.options[selectFornitore.selectedIndex];
        const fornitoreScelto = fornitoreOpt ? fornitoreOpt.textContent : "Non specificato";

        const htmlBody = `
          <html>
            <body>
              <p>Richiesta di attivazione procedura RV per il seguente punto vendita:</p>
              <table border="1" cellpadding="6" style="border-collapse: collapse; font-family: Calibri, sans-serif;">
                <tr style="background-color: #f2f2f2;"><td><b>Campo</b></td><td><b>Valore</b></td></tr>
                <tr><td>Codice PdV</td><td>${cPdv}</td></tr>
                <tr><td>Ragione Sociale</td><td>${cRag}</td></tr>
                <tr><td>Business Unit</td><td>${cBu}</td></tr>
                <tr><td>Gruppo</td><td><b>${gruppoScelto}</b></td></tr>
                <tr><td>Fornitore Selezionato</td><td>${fornitoreScelto}</td></tr>
                <tr><td>Tipologia Intervento</td><td>${tipologiaScelta}</td></tr>
                <tr><td>Venditore</td><td>${cVen}</td></tr>
              </table>
              <p style="font-size: 11px; color: #666;">Generato tramite Outlook Add-in ${APP_VERSION}</p>
            </body>
          </html>
        `;

        const messageFormOptions = {
          subject: "Richiesta RV - " + cPdv + " - " + cRag,
          htmlBody: htmlBody,
          cc: [cEmailRsm]
        };

        if (mode === "attach" && Office.context.mailbox.item && Office.context.mailbox.item.itemId) {
          messageFormOptions.attachments = [{
            type: "item",
            itemId: Office.context.mailbox.item.itemId,
            name: "Messaggio originario RV - " + cPdv + ".eml"
          }];
        }

        Office.context.mailbox.displayNewMessageForm(messageFormOptions);
        log("Finestra email creata.");
      });
    });
  </script>
</body>
</html>
