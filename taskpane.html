<!-- 
  ADD-IN RICHIESTE RV - TASKPANE COMPONENT
  Version: 1.4.0-Validity-Management
  Date: 2026-07-13
  Changes: Aggiunta gestione dinamica del Periodo Validità.
           Opzione 1: Vincolo date su anno selezionato.
           Opzione 2: Calcolo pro-rata automatico dei pesi percentuali sui giorni per il Pluriennale.
           Opzione 3: Selezione mese spot anno corrente.
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Richiesta RV - Data Entry</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; padding: 16px; font-size: 13px; color: #333; }
  h2 { font-size: 15px; margin-bottom: 4px; color: #0078d4; }
  #modeLabel, #userLabel { color: #666; margin-bottom: 8px; font-size: 11px; }
  #userLabel { font-weight: bold; color: #107c41; margin-bottom: 16px; }
  label { display: block; margin-top: 12px; font-weight: 600; }
  input, select, button { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 2px; }
  input[readonly] { background-color: #f3f3f3; color: #666; cursor: not-allowed; }
  button { margin-top: 20px; background: #0078d4; color: white; border: none; cursor: pointer; padding: 8px; font-weight: bold; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  
  .suggestions-list li.highlight { background-color: #0078d4; color: white; }
  .search-container { position: relative; }
  .suggestions-list { 
    position: absolute; top: 100%; left: 0; right: 0; 
    background: white; border: 1px solid #ccc; border-top: none; 
    max-height: 200px; overflow-y: auto; z-index: 1000; display: none; 
    margin: 0; padding: 0; list-style: none;
  }
  .suggestions-list li { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
  .suggestions-list li:hover { background: #f3f3f3; }
  
  #log { margin-top: 16px; padding: 8px; background: #f3f3f3; font-size: 11px; white-space: pre-wrap; min-height: 60px; border: 1px dashed #ccc; }
  .sez-validita { margin-top: 12px; padding: 10px; background: #f9f9f9; display: none; }
</style>
</head>
<body>
  <h2>Inserimento Richiesta RV</h2>
  <div id="modeLabel">Modalità: caricamento...</div>
  <div id="userLabel">Utente: verifica in corso...</div>

  <!-- SEZIONE RICERCA CLIENTE -->
  <label for="searchCliente">Cerca Cliente (Codice o Ragione Sociale)</label>
  <div class="search-container">
    <input type="text" id="searchCliente" placeholder="Caricamento database..." autocomplete="off" disabled>
    <ul id="suggestions" class="suggestions-list"></ul>
  </div>

  <!-- CAMPI ANAGRAFICA ESSENZIALI (READ-ONLY) -->
  <label for="codPdV">Cod PdV</label>
  <input type="text" id="codPdV" readonly>

  <label for="ragioneSociale">Ragione Sociale</label>
  <input type="text" id="ragioneSociale" readonly>

  <label for="codBU">Cod BU</label>
  <input type="text" id="codBU" readonly>

  <label for="emailRSM">Email RSM (Destinatario CC)</label>
  <input type="text" id="emailRSM" readonly>

  <!-- SEZIONE FORNITORE E TIPOLOGIA INTERVENTO -->
  <label for="selectFornitore">Fornitore</label>
  <select id="selectFornitore" disabled>
    <option value="">-- Seleziona o cerca per tipologia sotto --</option>
  </select>

  <label for="inputTipologia">Tipologia Intervento (Cerca linea/prodotto)</label>
  <input type="text" id="inputTipologia" list="listaTipologie" placeholder="Seleziona prima il fornitore o digita qui..." disabled>
  <datalist id="listaTipologie"></datalist>

  <!-- SEZIONE BUDGET E GRUPPO -->
  <label for="selectBudget">Budget</label>
  <select id="selectBudget" disabled>
    <option value="">-- Seleziona Budget --</option>
  </select>

  <label for="gruppoCliente">Gruppo?</label>
  <select id="gruppoCliente" disabled>
    <option value="No">No</option>
    <option value="Sì">Sì</option>
  </select>

  <!-- SEZIONE CONDIZIONALE: STIMA BUDGET -->
  <div id="sezioneStima" style="display: none; margin-top: 12px; padding: 10px; background: #f9f9f9; border-left: 3px solid #0078d4;">
    <label for="quantitaStima" style="margin-top: 0;">Quantità Stima (Intero)</label>
    <input type="number" id="quantitaStima" step="1" min="1" placeholder="Inserisci quantità numerica...">

    <label for="unitaMisura" style="margin-top: 10px;">Unità di Misura</label>
    <select id="unitaMisura">
      <option value="">-- Seleziona UDM --</option>
      <option value="PEZZI">PEZZI</option>
      <option value="COLLI">COLLI</option>
      <option value="HL">HL</option>
    </select>
  </div>

  <!-- SEZIONE NUOVA: PERIODO VALIDITÀ -->
  <label for="selectValidita">Periodo Validità</label>
  <select id="selectValidita" disabled>
    <option value="">-- Seleziona Tipo Validità --</option>
    <option value="annuale">1. Intervento Annuale</option>
    <option value="pluriennale">2. Pluriennale (Ripartizione Auto)</option>
    <option value="spot">3. Una tantum / Spot</option>
  </select>

  <!-- SUB-SEZIONE 1: ANNUALE -->
  <div id="sezAnnuale" class="sez-validita" style="border-left: 3px solid #ffb900;">
    <label for="annoAnnuale" style="margin-top: 0;">Seleziona Anno Riferimento</label>
    <select id="annoAnnuale">
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>
    <label for="dataInizioAnnuale">Data Inizio</label>
    <input type="date" id="dataInizioAnnuale">
    <label for="dataFineAnnuale">Data Fine</label>
    <input type="date" id="dataFineAnnuale">
  </div>

  <!-- SUB-SEZIONE 2: PLURIENNALE -->
  <div id="sezPluriennale" class="sez-validita" style="border-left: 3px solid #d83b01;">
    <label for="dataInizioPluri" style="margin-top: 0;">Data Inizio Libera</label>
    <input type="date" id="dataInizioPluri">
    <label for="dataFinePluri">Data Fine Libera</label>
    <input type="date" id="dataFinePluri">
    <div id="ripartizioneAutomaticaAnni" style="margin-top: 12px; font-size: 12px; background: #fff; padding: 8px; border: 1px solid #ddd; border-radius: 2px;">
      Nessun periodo calcolato. Inserisci le date sopra.
    </div>
  </div>

  <!-- SUB-SEZIONE 3: SPOT -->
  <div id="sezSpot" class="sez-validita" style="border-left: 3px solid #107c41;">
    <label for="meseSpot" style="margin-top: 0;">Mese Liquidazione (Anno Corrente 2026)</label>
    <select id="meseSpot">
      <option value="">-- Seleziona Mese --</option>
      <option value="Gennaio">Gennaio</option>
      <option value="Febbraio">Febbraio</option>
      <option value="Marzo">Marzo</option>
      <option value="Aprile">Aprile</option>
      <option value="Maggio">Maggio</option>
      <option value="Giugno">Giugno</option>
      <option value="Luglio">Luglio</option>
      <option value="Agosto">Agosto</option>
      <option value="Settembre">Settembre</option>
      <option value="Ottobre">Ottobre</option>
      <option value="Novembre">Novembre</option>
      <option value="Dicembre">Dicembre</option>
    </select>
  </div>

  <button id="submitBtn" disabled>Genera Richiesta RV</button>

  <div id="log">Log eventi...</div>

  <script>
    const APP_VERSION = "v1.4.0-Validity-Management";
    const MASTER_USERS = ["g.angelici@partesa.it"];

    let fullDatabase = [];      
    let filteredDatabase = [];  
    let fornitoreTipologiaDb = [];
    let budgetDb = [];
    let selectedCustomer = null;
    let highlightedIndex = -1;
    let calcoloPluriennaleOutput = ""; 

    function log(msg) {
      const el = document.getElementById("log");
      el.textContent += "\n" + msg;
      el.scrollTop = el.scrollHeight;
    }

    Office.onReady(async (info) => {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode") || "general";
      
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.textContent = mode === "attach" ? "Allega e Invia Richiesta RV" : "Apri e Invia Richiesta RV";
      document.getElementById("modeLabel").textContent = "Versione: " + APP_VERSION + " | Modalità: " + mode + " | Host: " + info.host;

      let userEmail = "";
      if (Office.context.mailbox && Office.context.mailbox.userProfile) {
        userEmail = Office.context.mailbox.userProfile.emailAddress.toLowerCase().trim();
      } else {
        userEmail = "giuseppe.angelici@partesa.it"; 
      }
      document.getElementById("userLabel").textContent = "Utente: " + userEmail;

      const urlClienti = "https://giuseppeangelici-coder.github.io/outlook-addin-test/QryCustomerMaster.json";
      const urlFornitori = "https://giuseppeangelici-coder.github.io/outlook-addin-test/FornitoriTipologie.json";
      const urlBudget = "https://giuseppeangelici-coder.github.io/outlook-addin-test/Budget.json";

      log("Avvio scaricamento database...");

      try {
        const [resClienti, resFornitori, resBudget] = await Promise.all([
          fetch(urlClienti),
          fetch(urlFornitori),
          fetch(urlBudget)
        ]);

        if (!resClienti.ok) throw new Error("Errore database clienti: " + resClienti.status);
        if (!resFornitori.ok) throw new Error("Errore database fornitori: " + resFornitori.status);
        if (!resBudget.ok) throw new Error("Errore database budget: " + resBudget.status);

        fullDatabase = await resClienti.json();
        fornitoreTipologiaDb = await resFornitori.json();
        budgetDb = await resBudget.json();

        log("Database caricati con successo.");

        applyRowLevelSecurity(userEmail);
        popolaFornitoriUnivoci();
        popolaBudget();
        setupGestioneValidita();

      } catch (err) {
        log("ERRORE CARICAMENTO: " + err.message);
      }

      function applyRowLevelSecurity(email) {
        const isMaster = MASTER_USERS.map(e => e.toLowerCase()).includes(email);
        if (isMaster) {
          filteredDatabase = fullDatabase;
          log("Profilo: MASTER DETECTED.");
        } else if (fullDatabase.some(c => (c.emailResponsabileVendite || c.EmailResponsabileVendite || "").toLowerCase() === email)) {
          filteredDatabase = fullDatabase.filter(c => (c.emailResponsabileVendite || c.EmailResponsabileVendite || "").toLowerCase() === email);
          log("Profilo: RV DETECTED.");
        } else if (fullDatabase.some(c => (c.emailResponsabileCommerciale || c.EmailResponsabileCommerciale || "").toLowerCase() === email)) {
          filteredDatabase = fullDatabase.filter(c => (c.emailResponsabileCommerciale || c.EmailResponsabileCommerciale || "").toLowerCase() === email);
          log("Profilo: RSM DETECTED.");
        } else {
          filteredDatabase = fullDatabase; 
          log("Email non in anagrafica. Test mode attiva.");
        }

        if (filteredDatabase.length > 0) {
          document.getElementById("searchCliente").disabled = false;
          document.getElementById("searchCliente").placeholder = "Cerca per Codice o Nome...";
        }
      }

      function popolaFornitoriUnivoci() {
        const selectFornitore = document.getElementById("selectFornitore");
        const fornitoriVisti = new Set();
        fornitoreTipologiaDb.forEach(item => {
          const cod = String(item.CodFornitore).trim();
          const ragSoc = String(item.RagioneSocialeFornitore).trim();
          if (cod && !fornitoriVisti.has(cod)) {
            fornitoriVisti.add(cod);
            const opt = document.createElement("option");
            opt.value = cod;
            opt.textContent = ragSoc;
            selectFornitore.appendChild(opt);
          }
        });
      }

      function popolaBudget() {
        const selectBudget = document.getElementById("selectBudget");
        budgetDb.forEach(item => {
          if (item.Budget) {
            const opt = document.createElement("option");
            opt.value = item.Budget;
            opt.textContent = item.Budget;
            selectBudget.appendChild(opt);
          }
        });

        selectBudget.addEventListener("change", () => {
          const budgetSelezionato = selectBudget.value;
          const match = budgetDb.find(b => b.Budget === budgetSelezionato);
          const sezioneStima = document.getElementById("sezioneStima");
          const quantitaStima = document.getElementById("quantitaStima");
          const unitaMisura = document.getElementById("unitaMisura");

          const obbligoStima = match && (match.ObbligoStima === true || String(match.ObbligoStima).toLowerCase() === "vero" || String(match.ObbligoStima).toLowerCase() === "true");

          if (obbligoStima) {
            sezioneStima.style.display = "block";
            quantitaStima.required = true;
            unitaMisura.required = true;
          } else {
            sezioneStima.style.display = "none";
            quantitaStima.required = false;
            unitaMisura.required = false;
            quantitaStima.value = "";
            unitaMisura.value = "";
          }
        });
      }

      // --- 9. LOGICA DI GESTIONE DEL PERIODO DI VALIDITÀ ---
      function setupGestioneValidita() {
        const selectValidita = document.getElementById("selectValidita");
        const sezioni = {
          annuale: document.getElementById("sezAnnuale"),
          pluriennale: document.getElementById("sezPluriennale"),
          spot: document.getElementById("sezSpot")
        };

        // Inputs Annuale
        const annoAnnuale = document.getElementById("annoAnnuale");
        const dataInizioAnnuale = document.getElementById("dataInizioAnnuale");
        const dataFineAnnuale = document.getElementById("dataFineAnnuale");

        // Inputs Pluriennale
        const dataInizioPluri = document.getElementById("dataInizioPluri");
        const dataFinePluri = document.getElementById("dataFinePluri");

        // Inputs Spot
        const meseSpot = document.getElementById("meseSpot");

        // Al cambio del tipo validità, mostra la sezione corrispondente e imposta i required
        selectValidita.addEventListener("change", () => {
          Object.values(sezioni).forEach(s => s.style.display = "none");
          
          // Reset required
          dataInizioAnnuale.required = false; dataFineAnnuale.required = false;
          dataInizioPluri.required = false; dataFinePluri.required = false;
          meseSpot.required = false;

          const v = selectValidita.value;
          if (v && sezioni[v]) {
            sezioni[v].style.display = "block";
            if (v === "annuale") {
              dataInizioAnnuale.required = true;
              dataFineAnnuale.required = true;
              allineaVincoliAnnoAnnuale();
            } else if (v === "pluriennale") {
              dataInizioPluri.required = true;
              dataFinePluri.required = true;
              eseguiCalcoloPluriennale();
            } else if (v === "spot") {
              meseSpot.required = true;
            }
          }
        });

        // Forza i vincoli min/max sulle date dell'opzione 1 in base all'anno scelto
        function allineaVincoliAnnoAnnuale() {
          const anno = annoAnnuale.value;
          dataInizioAnnuale.min = `${anno}-01-01`;
          dataInizioAnnuale.max = `${anno}-12-31`;
          dataFineAnnuale.min = `${anno}-01-01`;
          dataFineAnnuale.max = `${anno}-12-31`;
          
          // Se la data precedentemente inserita è fuori range, pulisci
          if (dataInizioAnnuale.value && !dataInizioAnnuale.value.startsWith(anno)) dataInizioAnnuale.value = "";
          if (dataFineAnnuale.value && !dataFineAnnuale.value.startsWith(anno)) dataFineAnnuale.value = "";
        }
        annoAnnuale.addEventListener("change", allineaVincoliAnnoAnnuale);

        // Calcolo automatico Pro-Rata dei Giorni sul Pluriennale
        function eseguiCalcoloPluriennale() {
          const divOutput = document.getElementById("ripartizioneAutomaticaAnni");
          calcoloPluriennaleOutput = "";

          if (!dataInizioPluri.value || !dataFinePluri.value) {
            divOutput.innerHTML = "Inserisci entrambe le date per calcolare la quota pro-rata.";
            return;
          }

          const inizio = new Date(dataInizioPluri.value);
          const fine = new Date(dataFinePluri.value);

          if (inizio > fine) {
            divOutput.innerHTML = "<span style='color:red;'>Errore: La data inizio è successiva alla data fine.</span>";
            return;
          }

          const millisecondiInGiorno = 24 * 60 * 60 * 1000;
          // Totale giorni compresi estremi
          const totaleGiorni = Math.round((fine - inizio) / millisecondiInGiorno) + 1;

          const annoInizio = inizio.getFullYear();
          const annoFine = fine.getFullYear();
          let ripartizione = {};

          for (let anno = annoInizio; anno <= annoFine; anno++) {
            const dataInizioAnno = new Date(anno, 0, 1);
            const dataFineAnno = new Date(anno, 11, 31);

            const dataInizioEffettiva = inizio > dataInizioAnno ? inizio : dataInizioAnno;
            const dataFineEffettiva = fine < dataFineAnno ? fine : dataFineAnno;

            const giorniAnno = Math.round((dataFineEffettiva - dataInizioEffettiva) / millisecondiInGiorno) + 1;
            ripartizione[anno] = giorniAnno;
          }

          let htmlTable = `<table style='width:100%; border-collapse:collapse; text-align:left;'>
            <tr style='background:#eee;'>
              <th style='padding:4px;'>Anno</th>
              <th style='padding:4px;'>Giorni Competenza</th>
              <th style='padding:4px;'>Quota % Peso</th>
            </tr>`;
          
          let logTesto = [];

          Object.keys(ripartizione).forEach(anno => {
            const gg = ripartizione[anno];
            const pct = ((gg / totaleGiorni) * 100).toFixed(1);
            htmlTable += `<tr>
              <td style='padding:4px;'>${anno}</td>
              <td style='padding:4px;'>${gg} gg</td>
              <td style='padding:4px;'><b>${pct}%</b></td>
            </tr>`;
            logTesto.push(`${anno}: ${gg}gg (${pct}%)`);
          });

          htmlTable += `</table><div style='margin-top:6px; font-weight:bold;'>Giorni Totali complessivi: ${totaleGiorni} gg</div>`;
          divOutput.innerHTML = htmlTable;
          calcoloPluriennaleOutput = logTesto.join(" | ");
        }

        dataInizioPluri.addEventListener("change", eseguiCalcoloPluriennale);
        dataFinePluri.addEventListener("change", eseguiCalcoloPluriennale);
      }

      // GESTIONE DEI FILTRI INCROCIATI (CASCADING)
      const selectFornitore = document.getElementById("selectFornitore");
      const inputTipologia = document.getElementById("inputTipologia");
      const listaTipologie = document.getElementById("listaTipologie");

      selectFornitore.addEventListener("change", () => {
        inputTipologia.value = ""; 
        aggiornaDatalistTipologie(selectFornitore.value);
      });

      inputTipologia.addEventListener("change", () => {
        const valoreScelto = inputTipologia.value.trim();
        const match = fornitoreTipologiaDb.find(item => String(item.TipologiaIntervento).trim() === valoreScelto);
        if (!match) return;

        const targetCodice = String(match.CodFornitore).trim();
        const optionEsistente = [...selectFornitore.options].find(o => String(o.value).trim() === targetCodice);

        if (optionEsistente) {
          selectFornitore.value = optionEsistente.value;
        }
        aggiornaDatalistTipologie(targetCodice);
      });

      function aggiornaDatalistTipologie(codFornitore = "") {
        listaTipologie.innerHTML = "";
        const tipologieFiltrate = fornitoreTipologiaDb.filter(item => {
          return codFornitore === "" || String(item.CodFornitore).trim() === String(codFornitore).trim();
        });
        tipologieFiltrate.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item.TipologiaIntervento; 
          listaTipologie.appendChild(opt);
        });
      }
      aggiornaDatalistTipologie();

      // AUTOCOMPLETE CLIENTE
      const searchInput = document.getElementById("searchCliente");
      const suggestionsList = document.getElementById("suggestions");

      searchInput.addEventListener("input", (e) => {
        highlightedIndex = -1;
        const query = e.target.value.toLowerCase().trim();
        suggestionsList.innerHTML = "";
        suggestionsList.style.display = "none";

        if (query.length < 2) return;

        const filtered = filteredDatabase.filter(c => {
          const chiave = c.searchKey || c.SearchKey || "";
          return chiave.toLowerCase().includes(query);
        }).slice(0, 10);

        if (filtered.length > 0) {
          suggestionsList.style.display = "block";
          filtered.forEach(c => {
            const li = document.createElement("li");
            li.textContent = c.searchKey || c.SearchKey || "";
            li.customerData = c;
            li.addEventListener("click", () => selectCustomer(c));
            suggestionsList.appendChild(li);
          });
        }
      });

      searchInput.addEventListener("keydown", (e) => {
        const items = suggestionsList.querySelectorAll("li");
        if (items.length === 0) return;

        if (e.key === "ArrowDown") {
          e.preventDefault();
          highlightedIndex = highlightedIndex < items.length - 1 ? highlightedIndex + 1 : 0;
          updateHighlight(items);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          highlightedIndex = highlightedIndex > 0 ? highlightedIndex - 1 : items.length - 1;
          updateHighlight(items);
        } else if (e.key === "Enter") {
          if (highlightedIndex >= 0) {
            e.preventDefault();
            selectCustomer(items[highlightedIndex].customerData);
          }
        } else if (e.key === "Escape") {
          suggestionsList.style.display = "none";
          highlightedIndex = -1;
        }
      });

      function updateHighlight(items) {
        items.forEach(item => item.classList.remove("highlight"));
        if (highlightedIndex >= 0) {
          items[highlightedIndex].classList.add("highlight");
          items[highlightedIndex].scrollIntoView({ block: "nearest" });
        }
      }

      function selectCustomer(customer) {
        suggestionsList.style.display = "none";
        highlightedIndex = -1;
        selectedCustomer = customer;
        searchInput.value = customer.searchKey || customer.SearchKey || "";
        
        document.getElementById("selectBudget").disabled = false;
        document.getElementById("selectValidita").disabled = false; // SBLOCCO VALIDITA
        document.getElementById("codPdV").value = customer.codPdV || customer.CodPdV || "";
        document.getElementById("ragioneSociale").value = customer.ragioneSociale || customer.RagioneSociale || "";
        document.getElementById("codBU").value = customer.codBU || customer.CodBU || "";
        document.getElementById("emailRSM").value = customer.emailResponsabileCommerciale || customer.EmailResponsabileCommerciale || "";

        selectFornitore.disabled = false;
        inputTipologia.disabled = false;
        document.getElementById("gruppoCliente").disabled = false;
        submitBtn.disabled = false;
      }

      // SUBMIT CON CONTROLLO VALIDITÀ COMPILAZIONE
      submitBtn.addEventListener("click", () => {
        if (!selectedCustomer) return;

        // Validazione budget
        const quantitaStima = document.getElementById("quantitaStima");
        const unitaMisura = document.getElementById("unitaMisura");
        if (quantitaStima.required) {
          const qVal = parseInt(quantitaStima.value, 10);
          if (isNaN(qVal) || qVal <= 0 || !unitaMisura.value) {
            alert("Errore: Valorizzare Quantità Stima e Unità di Misura.");
            return;
          }
        }

        // VALIDAZIONE CONDIZIONALE NUOVA VALIDITÀ
        const tipoValidita = document.getElementById("selectValidita").value;
        if (!tipoValidita) {
          alert("Errore: Selezionare una tipologia di Periodo Validità.");
          return;
        }

        let stringaDettaglioValidita = "";

        if (tipoValidita === "annuale") {
          const dIn = document.getElementById("dataInizioAnnuale").value;
          const dFi = document.getElementById("dataFineAnnuale").value;
          if (!dIn || !dFi) {
            alert("Errore: Selezionare le date di inizio e fine per l'intervento annuale.");
            return;
          }
          if (new Date(dIn) > new Date(dFi)) {
            alert("Errore: La data inizio è successiva alla data fine.");
            return;
          }
          stringaDettaglioValidita = `Annuale (Anno ref: ${document.getElementById("annoAnnuale").value}) - Dal ${dIn} al ${dFi}`;
        } 
        else if (tipoValidita === "pluriennale") {
          const dIn = document.getElementById("dataInizioPluri").value;
          const dFi = document.getElementById("dataFinePluri").value;
          if (!dIn || !dFi) {
            alert("Errore: Compilare le date del periodo Pluriennale per permettere la ripartizione.");
            return;
          }
          if (new Date(dIn) > new Date(dFi)) {
            alert("Errore: La data inizio è successiva alla data fine.");
            return;
          }
          stringaDettaglioValidita = `Pluriennale - Dal ${dIn} al ${dFi} [Ripartizione calcolata: ${calcoloPluriennaleOutput}]`;
        } 
        else if (tipoValidita === "spot") {
          const mScelto = document.getElementById("meseSpot").value;
          if (!mScelto) {
            alert("Errore: Selezionare il mese richiesto per l'intervento Una tantum/Spot.");
            return;
          }
          stringaDettaglioValidita = `Una tantum / Spot - Mese liquidazione richiesto: ${mScelto} 2026`;
        }

        const cPdv = selectedCustomer.codPdV || selectedCustomer.CodPdV || "";
        const cRag = selectedCustomer.ragioneSociale || selectedCustomer.RagioneSociale || "";
        const cBu = selectedCustomer.codBU || selectedCustomer.CodBU || "";
        const cVen = selectedCustomer.venditore || selectedCustomer.Venditore || "N/D";
        const cEmailRsm = selectedCustomer.emailResponsabileCommerciale || selectedCustomer.EmailResponsabileCommerciale || "";
        
        const budgetScelto = document.getElementById("selectBudget").value || "N/D";
        const qStimaText = quantitaStima.required ? quantitaStima.value : "Non richiesta";
        const udmText = quantitaStima.required ? unitaMisura.value : "Non richiesta";
        const gruppoScelto = document.getElementById("gruppoCliente").value;
        const tipologiaScelta = inputTipologia.value.trim() || "Non specificata";
        const fornitoreOpt = selectFornitore.options[selectFornitore.selectedIndex];
        const fornitoreScelto = fornitoreOpt ? fornitoreOpt.textContent : "Non specificato";

        const htmlBody = `
          <html>
            <body>
              <p>Richiesta di attivazione procedura RV per il seguente punto vendita:</p>
              <table border="1" cellpadding="6" style="border-collapse: collapse; font-family: Calibri, sans-serif;">
                <tr style="background-color: #f2f2f2;"><td><b>Campo</b></td><td><b>Valore</b></td></tr>
                <tr><td>Codice PdV</td><td>${cPdv}</td></tr>
                <tr><td>Ragione Sociale</td><td>${cRag}</td></tr>
                <tr><td>Business Unit</td><td>${cBu}</td></tr>
                <tr><td>Gruppo</td><td><b>${gruppoScelto}</b></td></tr>
                <tr><td>Fornitore Selezionato</td><td>${fornitoreScelto}</td></tr>
                <tr><td>Tipologia Intervento</td><td>${tipologiaScelta}</td></tr>
                <tr><td>Budget</td><td>${budgetScelto}</td></tr>
                <tr><td>Quantità Stima</td><td>${qStimaText}</td></tr>
                <tr><td>Unità di...</td><td>${udmText}</td></tr>
                <tr><td><b>Periodo Validità</b></td><td><span style="color:#d83b01;"><b>${stringaDettaglioValidita}</b></span></td></tr>
                <tr><td>Venditore</td><td>${cVen}</td></tr>
              </table>
              <p style="font-size: 11px; color: #666;">Generato tramite Outlook Add-in ${APP_VERSION}</p>
            </body>
          </html>
        `;

        const messageFormOptions = {
          subject: "Richiesta RV - " + cPdv + " - " + cRag,
          htmlBody: htmlBody,
          cc: [cEmailRsm]
        };

        if (mode === "attach" && Office.context.mailbox.item && Office.context.mailbox.item.itemId) {
          messageFormOptions.attachments = [{
            type: "item",
            itemId: Office.context.mailbox.item.itemId,
            name: "Messaggio originario RV - " + cPdv + ".eml"
          }];
        }

        Office.context.mailbox.displayNewMessageForm(messageFormOptions);
        log("Finestra email creata con dettagli validità.");
      });
    });
  </script>
</body>
</html>
