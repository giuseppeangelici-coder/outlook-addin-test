<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richiesta Investimento Commerciale v2.0.3</title>
    <!-- Script di OfficeJS -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 15px;
            background-color: #f8f9fa;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .search-container {
            position: relative;
        }
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            max-height: 150px;
            overflow-y: auto;
            z-index: 1000;
            list-style: none;
            padding: 0;
            margin: 0;
            display: none;
        }
        .suggestions-list li {
            padding: 8px;
            cursor: pointer;
        }
        .suggestions-list li:hover {
            background-color: #e9ecef;
        }
        .required {
            color: #d9534f;
        }
        .status-message {
            display: none;
            margin: 0 0 12px 0;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid transparent;
            font-size: 0.92em;
        }
        .status-message.error {
            display: block;
            background: #fff4f4;
            border-color: #f5c2c7;
            color: #842029;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            border: none;
            border-radius: 4px;
            padding: 9px 12px;
            cursor: pointer;
            font-weight: 600;
        }
        #submitBtn {
            background: #0d6efd;
            color: #fff;
            flex: 1;
        }
        #submitBtn:disabled {
            background: #8cb9ff;
            cursor: not-allowed;
        }
        #resetBtn {
            background: #e9ecef;
            color: #333;
        }
        .footer-version {
            margin-top: 30px;
            font-size: 0.8em;
            color: #6c757d;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Richiesta Investimento</h2>
    <div id="statusMessage" class="status-message"></div>

    <div class="form-group" id="containerPercorso">
        <label for="selectPercorso">Tipo di Richiesta <span class="required">*</span></label>
        <select id="selectPercorso" onchange="aggiornaVisibilitaPercorso()">
            <option value="">-- Seleziona Percorso --</option>
            <option value="fornitore">Investimento coperto da fornitore</option>
            <option value="partesa">Investimento a carico Partesa</option>
            <option value="omaggio">Merce omaggio</option>
        </select>
    </div>

    <div class="form-group" id="containerCliente">
        <label for="inputCliente">Cliente <span class="required">*</span></label>
        <div class="search-container">
            <input type="text" id="inputCliente" placeholder="Cerca cliente per Codice o Ragione Sociale..." autocomplete="off" disabled>
            <ul id="suggestionsCliente" class="suggestions-list"></ul>
        </div>
    </div>

    <div class="form-group" id="containerGruppo">
        <label for="selectGruppo">Gruppo Cliente</label>
        <select id="selectGruppo">
            <option value="">-- Seleziona Gruppo --</option>
            <option value="No">No</option>
            <option value="Si">Sì</option>
        </select>
    </div>

    <div class="form-group" id="containerFornitore">
        <label for="inputFornitore">Fornitore <span class="required">*</span></label>
        <div class="search-container">
            <input type="text" id="inputFornitore" placeholder="Cerca fornitore..." autocomplete="off" disabled>
            <ul id="suggestionsFornitore" class="suggestions-list"></ul>
        </div>
        <input type="hidden" id="selectFornitore">
    </div>

    <div class="form-group" id="containerBudget">
        <label for="selectBudget">Budget / Capillare</label>
        <select id="selectBudget">
            <option value="">-- Seleziona Budget --</option>
        </select>
    </div>

    <div class="form-group" id="containerTipologia">
        <label for="selectTipologia">Tipologia Investimento</label>
        <select id="selectTipologia">
            <option value="">-- Seleziona Tipologia --</option>
        </select>
    </div>

    <div class="form-group" id="containerValidita">
        <label for="inputDataInizio">Data Inizio Validità</label>
        <input type="date" id="inputDataInizio">
        <label for="inputDataFine" style="margin-top: 5px;">Data Fine Validità</label>
        <input type="date" id="inputDataFine">
    </div>

    <div class="form-group" id="containerEconomica">
        <label for="inputImporto">Importo (€)</label>
        <input type="number" id="inputImporto" step="0.01" min="0.01" placeholder="0.00">
    </div>

    <div class="form-group" id="containerOmaggio" style="display: none;">
        <label>Dettaglio Merce Omaggio <span class="required">*</span></label>
        <div id="grigliaOmaggioContainer">
            <p style="font-size: 0.9em; color: #555; margin-top: 0;">Inserire almeno un articolo omaggio.</p>
            <div style="display:grid;grid-template-columns:1fr 110px;gap:8px;align-items:end;">
                <div>
                    <label for="codArticolo1">Cod. Articolo #1 <span class="required">*</span></label>
                    <input type="text" id="codArticolo1" placeholder="Codice articolo">
                </div>
                <div>
                    <label for="qtaArticolo1">Q.tà <span class="required">*</span></label>
                    <input type="number" id="qtaArticolo1" min="1" step="1" placeholder="Q.tà">
                </div>
            </div>
        </div>
    </div>

    <div class="form-group" id="containerNote">
        <label for="inputNote">Note</label>
        <textarea id="inputNote" rows="3" placeholder="Note aggiuntive..."></textarea>
    </div>

    <div class="button-row">
        <button type="button" id="submitBtn" disabled>Genera Richiesta RV</button>
        <button type="button" id="resetBtn" onclick="resetForm()">Pulisci Form</button>
    </div>

    <div class="footer-version">
        Versione Add-in: <strong id="appVersion">v2.0.3</strong>
    </div>

    <script>
        const APP_VERSION = "v2.0.3";
        const BASE_DATA_URL = "https://giuseppeangelici-coder.github.io/outlook-addin-test";

        const PERCORSO_RICHIESTA = {
            fornitore: "fornitore",
            partesa: "partesa",
            omaggio: "omaggio"
        };

        let masterDatabase = [];
        let filteredDatabase = [];
        let fornitoriDB = [];
        let tipologieDB = [];

        let selectedCustomer = null;
        let selectedSupplier = null;
        let userRegion = "";

        function showStatus(message, isError = false) {
            const status = document.getElementById("statusMessage");
            status.textContent = message || "";
            status.className = "status-message" + (isError ? " error" : "");
            status.style.display = message ? "block" : "none";
        }

        Office.onReady(async (info) => {
            if (info.host !== Office.HostType.Outlook) return;

            document.getElementById("appVersion").textContent = APP_VERSION;

            await inizializzaFlussoUtente();
            await caricaAnagraficheFornitoriETipologie();
            setupEventListeners();
            window.aggiornaVisibilitaPercorso();
            validaForm();
        });

        async function inizializzaFlussoUtente() {
            try {
                const userEmail = String(Office?.context?.mailbox?.userProfile?.emailAddress || "").toLowerCase().trim();
                const response = await fetch(`${BASE_DATA_URL}/QryCustomerMaster.json`, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status} su QryCustomerMaster.json`);
                masterDatabase = await response.json();

                filteredDatabase = masterDatabase.filter(c => {
                    const emailRSM = String(c.EmailRSM || c.emailRSM || c.emailResponsabileCommerciale || "").toLowerCase().trim();
                    const emailRV = String(c.emailResponsabileVendite || c.EmailResponsabileVendite || "").toLowerCase().trim();
                    return emailRSM === userEmail || emailRV === userEmail;
                });

                if (!filteredDatabase.length) {
                    document.getElementById("inputCliente").disabled = true;
                    showStatus("Utente non autorizzato: nessun cliente associato al tuo profilo Office.", true);
                    return;
                }

                document.getElementById("inputCliente").disabled = false;
                showStatus("");

                const first = filteredDatabase[0] || {};
                userRegion = String(first.codBU || first.CodBU || "").trim();
            } catch (error) {
                console.error("Errore inizializzazione dati utente:", error);
                document.getElementById("inputCliente").disabled = true;
                showStatus("Errore nel caricamento dell'anagrafica clienti.", true);
            }
        }

        async function caricaAnagraficheFornitoriETipologie() {
            try {
                const [fornitoriRes, tipologieRes] = await Promise.all([
                    fetch(`${BASE_DATA_URL}/Fornitori.json`, { cache: "no-store" }),
                    fetch(`${BASE_DATA_URL}/FornitoriTipologie.json`, { cache: "no-store" })
                ]);

                if (!fornitoriRes.ok) throw new Error(`HTTP ${fornitoriRes.status} su Fornitori.json`);
                if (!tipologieRes.ok) throw new Error(`HTTP ${tipologieRes.status} su FornitoriTipologie.json`);

                fornitoriDB = await fornitoriRes.json();
                tipologieDB = await tipologieRes.json();
            } catch (error) {
                console.error("Errore caricamento anagrafiche fornitore/tipologie:", error);
                fornitoriDB = [];
                tipologieDB = [];
                showStatus("Errore nel caricamento fornitori/tipologie.", true);
            }
        }

        function setupEventListeners() {
            const inputCliente = document.getElementById("inputCliente");
            const inputFornitore = document.getElementById("inputFornitore");

            if (inputCliente) inputCliente.addEventListener("input", gestisciInputCliente);
            if (inputFornitore) inputFornitore.addEventListener("input", gestisciInputFornitore);

            ["selectGruppo", "selectBudget", "selectTipologia", "inputDataInizio", "inputDataFine", "inputImporto", "inputNote", "selectPercorso", "codArticolo1", "qtaArticolo1"].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener("input", validaForm);
                if (el && el.tagName === "SELECT") el.addEventListener("change", validaForm);
            });

            document.addEventListener("click", function (e) {
                if (!e.target.closest('.search-container')) {
                    nascondiSuggerimenti("suggestionsFornitore");
                    nascondiSuggerimenti("suggestionsCliente");
                }
            });

            document.getElementById("submitBtn").addEventListener("click", () => {
                if (!validaForm()) {
                    showStatus("Compila tutti i campi obbligatori prima di generare la richiesta.", true);
                    return;
                }
                showStatus("Validazione OK. Richiesta pronta per l'invio.");
            });
        }

        function gestisciInputCliente(e) {
            const query = e.target.value.trim().toLowerCase();
            if (query.length < 2) {
                nascondiSuggerimenti("suggestionsCliente");
                selectedCustomer = null;
                validaForm();
                return;
            }

            const risultati = filteredDatabase.filter(c => {
                const codice = String(c.codPdV || c.CodPdV || "").toLowerCase();
                const ragione = String(c.ragioneSociale || c.RagioneSociale || "").toLowerCase();
                return codice.includes(query) || ragione.includes(query);
            }).slice(0, 10);

            mostraSuggerimentiCliente(risultati);
        }

        function mostraSuggerimentiCliente(lista) {
            const suggestionsBox = document.getElementById("suggestionsCliente");
            suggestionsBox.innerHTML = "";
            if (!lista.length) return nascondiSuggerimenti("suggestionsCliente");

            lista.forEach(cliente => {
                const codice = String(cliente.codPdV || cliente.CodPdV || "").trim();
                const ragione = String(cliente.ragioneSociale || cliente.RagioneSociale || "").trim();
                const li = document.createElement("li");
                li.textContent = `${ragione} (${codice})`;
                li.addEventListener("click", () => selezionaCliente(cliente));
                suggestionsBox.appendChild(li);
            });

            suggestionsBox.style.display = "block";
        }

        function selezionaCliente(cliente) {
            selectedCustomer = cliente;
            const codice = String(cliente.codPdV || cliente.CodPdV || "").trim();
            const ragione = String(cliente.ragioneSociale || cliente.RagioneSociale || "").trim();
            const region = String(cliente.codBU || cliente.CodBU || "").trim();

            document.getElementById("inputCliente").value = `${ragione} (${codice})`;
            userRegion = region || userRegion;

            nascondiSuggerimenti("suggestionsCliente");
            validaForm();
        }

        function gestisciInputFornitore(e) {
            const query = e.target.value.trim().toLowerCase();

            if (query.length < 2) {
                nascondiSuggerimenti("suggestionsFornitore");
                selectedSupplier = null;
                document.getElementById("selectFornitore").value = "";
                popolaTipologiePerFornitore("");
                validaForm();
                return;
            }

            const risultati = fornitoriDB.filter(f => {
                const regFornitore = String(f.Region || "").toUpperCase();
                const regUtente = String(userRegion || "").toUpperCase();
                const appartieneAllaRegion = !regUtente || regFornitore === regUtente || regFornitore === "ALL";

                const ragSoc = String(f.RagioneSocialeFornitore || f.RagSocFornitore || "").toLowerCase();
                const cod = String(f.CodFornitore || "").toLowerCase();

                return appartieneAllaRegion && (ragSoc.includes(query) || cod.includes(query));
            }).slice(0, 10);

            mostraSuggerimentiFornitore(risultati);
        }

        function mostraSuggerimentiFornitore(lista) {
            const suggestionsBox = document.getElementById("suggestionsFornitore");
            suggestionsBox.innerHTML = "";
            if (!lista.length) return nascondiSuggerimenti("suggestionsFornitore");

            lista.forEach(f => {
                const ragSoc = String(f.RagioneSocialeFornitore || f.RagSocFornitore || "").trim();
                const cod = String(f.CodFornitore || "").trim();
                const li = document.createElement("li");
                li.textContent = `${ragSoc} (${cod})`;
                li.addEventListener("click", () => selezionaFornitore(f));
                suggestionsBox.appendChild(li);
            });

            suggestionsBox.style.display = "block";
        }

        function popolaTipologiePerFornitore(codFornitore) {
            const selectTipologia = document.getElementById("selectTipologia");
            selectTipologia.innerHTML = '<option value="">-- Seleziona Tipologia --</option>';

            if (!codFornitore) return;

            const uniche = new Set();
            tipologieDB.forEach(item => {
                const cod = String(item.CodFornitore || "").trim();
                const tip = String(item.TipologiaIntervento || "").trim();
                if (cod === codFornitore && tip) uniche.add(tip);
            });

            [...uniche].forEach(tip => {
                const opt = document.createElement("option");
                opt.value = tip;
                opt.textContent = tip;
                selectTipologia.appendChild(opt);
            });
        }

        function selezionaFornitore(fornitore) {
            const ragSoc = String(fornitore.RagioneSocialeFornitore || fornitore.RagSocFornitore || "").trim();
            const cod = String(fornitore.CodFornitore || "").trim();

            selectedSupplier = {
                CodFornitore: cod,
                RagSocFornitore: ragSoc
            };

            document.getElementById("inputFornitore").value = `${ragSoc} (${cod})`;
            document.getElementById("selectFornitore").value = cod;

            popolaTipologiePerFornitore(cod);
            nascondiSuggerimenti("suggestionsFornitore");
            validaForm();
        }

        function nascondiSuggerimenti(elementId) {
            const box = document.getElementById(elementId);
            if (!box) return;
            box.innerHTML = "";
            box.style.display = "none";
        }

        window.aggiornaVisibilitaPercorso = function () {
            const percorso = document.getElementById("selectPercorso").value;

            const containerGruppo = document.getElementById("containerGruppo");
            const containerFornitore = document.getElementById("containerFornitore");
            const containerBudget = document.getElementById("containerBudget");
            const containerTipologia = document.getElementById("containerTipologia");
            const containerValidita = document.getElementById("containerValidita");
            const containerEconomica = document.getElementById("containerEconomica");
            const containerOmaggio = document.getElementById("containerOmaggio");
            const inputFornitore = document.getElementById("inputFornitore");

            if (!percorso) {
                containerGruppo.style.display = "none";
                containerFornitore.style.display = "none";
                containerBudget.style.display = "none";
                containerTipologia.style.display = "none";
                containerValidita.style.display = "none";
                containerEconomica.style.display = "none";
                containerOmaggio.style.display = "none";
                inputFornitore.value = "";
                inputFornitore.disabled = true;
                selectedSupplier = null;
                document.getElementById("selectFornitore").value = "";
                popolaTipologiePerFornitore("");
                validaForm();
                return;
            }

            if (percorso === PERCORSO_RICHIESTA.fornitore) {
                containerGruppo.style.display = "block";
                containerFornitore.style.display = "block";
                containerBudget.style.display = "block";
                containerTipologia.style.display = "block";
                containerValidita.style.display = "block";
                containerEconomica.style.display = "block";
                containerOmaggio.style.display = "none";
                inputFornitore.disabled = !selectedCustomer;

                if (!selectedCustomer) {
                    inputFornitore.value = "";
                    selectedSupplier = null;
                    document.getElementById("selectFornitore").value = "";
                    popolaTipologiePerFornitore("");
                }
            } else if (percorso === PERCORSO_RICHIESTA.partesa) {
                containerGruppo.style.display = "block";
                containerFornitore.style.display = "none";
                containerBudget.style.display = "block";
                containerTipologia.style.display = "block";
                containerValidita.style.display = "block";
                containerEconomica.style.display = "block";
                containerOmaggio.style.display = "none";

                selectedSupplier = null;
                document.getElementById("selectFornitore").value = "";
                inputFornitore.value = "";
                inputFornitore.disabled = true;
                popolaTipologiePerFornitore("");
            } else if (percorso === PERCORSO_RICHIESTA.omaggio) {
                containerGruppo.style.display = "none";
                containerFornitore.style.display = "block";
                containerBudget.style.display = "none";
                containerTipologia.style.display = "none";
                containerValidita.style.display = "none";
                containerEconomica.style.display = "none";
                containerOmaggio.style.display = "block";

                inputFornitore.value = "PARTESA S.P.A. (PARTESA)";
                inputFornitore.disabled = true;
                document.getElementById("selectFornitore").value = "PARTESA";
                selectedSupplier = { CodFornitore: "PARTESA", RagSocFornitore: "PARTESA S.P.A." };
                popolaTipologiePerFornitore("");
            }

            validaForm();
        };

        function validaForm() {
            const submitBtn = document.getElementById("submitBtn");
            const percorso = document.getElementById("selectPercorso").value;

            if (!percorso) return (submitBtn.disabled = true, false);
            if (!selectedCustomer) return (submitBtn.disabled = true, false);

            if (percorso === PERCORSO_RICHIESTA.fornitore && !selectedSupplier) {
                submitBtn.disabled = true;
                return false;
            }

            if (percorso === PERCORSO_RICHIESTA.omaggio) {
                const codArticolo1 = String(document.getElementById("codArticolo1").value || "").trim();
                const qtaArticolo1 = Number(document.getElementById("qtaArticolo1").value || 0);
                const okOmaggio = codArticolo1.length > 0 && qtaArticolo1 > 0;
                submitBtn.disabled = !okOmaggio;
                return okOmaggio;
            }

            const importo = Number(document.getElementById("inputImporto").value || 0);
            const dataInizio = document.getElementById("inputDataInizio").value;
            const dataFine = document.getElementById("inputDataFine").value;
            const isValid = importo > 0 && !!dataInizio && !!dataFine;

            submitBtn.disabled = !isValid;
            return isValid;
        }

        function resetForm() {
            document.getElementById("selectPercorso").value = "";
            document.getElementById("inputCliente").value = "";
            document.getElementById("selectGruppo").value = "";
            document.getElementById("inputFornitore").value = "";
            document.getElementById("selectFornitore").value = "";
            document.getElementById("selectBudget").value = "";
            document.getElementById("selectTipologia").value = "";
            document.getElementById("inputDataInizio").value = "";
            document.getElementById("inputDataFine").value = "";
            document.getElementById("inputImporto").value = "";
            document.getElementById("inputNote").value = "";
            document.getElementById("codArticolo1").value = "";
            document.getElementById("qtaArticolo1").value = "";

            selectedCustomer = null;
            selectedSupplier = null;

            nascondiSuggerimenti("suggestionsCliente");
            nascondiSuggerimenti("suggestionsFornitore");
            popolaTipologiePerFornitore("");
            showStatus("");

            window.aggiornaVisibilitaPercorso();
            validaForm();
        }
    </script>
</body>
</html>
